name: fetch-reel
on:
  push:
    branches: [claude/instagram-reel-review-tvx2bk]
    paths: ['.github/workflows/fetch-reel.yml']
jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Transcribe reel audio
        run: |
          set -x
          pip install -q yt-dlp faster-whisper
          yt-dlp --no-warnings -o "tmp-reel/reel.%(ext)s" "https://www.instagram.com/reel/DZQU76-x-1G/" 2> tmp-reel/ytdlp-err2.txt || true
          python3 - <<'EOF'
          from faster_whisper import WhisperModel
          m = WhisperModel("base", device="cpu", compute_type="int8")
          segs, info = m.transcribe("tmp-reel/reel.mp4")
          with open("tmp-reel/transcript.txt", "w") as f:
              for s in segs:
                  f.write(f"[{s.start:6.1f}-{s.end:6.1f}] {s.text.strip()}\n")
          EOF
          rm -f tmp-reel/reel.mp4
      - name: Commit results
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A tmp-reel
          git commit -m "tmp: reel transcript [skip ci]" || echo "nothing to commit"
          git push
