# One-shot helper: downloads the two candidate mount-scene start images on
# a runner (the dev sandbox's egress proxy can't reach the CDN) so they can
# be reviewed locally. Skips itself once the folder exists; deleted after use.
name: Fetch mount candidates

on:
  push:
    branches:
      - claude/landing-page-redesign-oia51n

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip if already fetched
        id: check
        run: |
          if [ -d assets/tmp-mount ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download candidates
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p assets/tmp-mount
          curl -sSL -o assets/tmp-mount/mount-1.png "https://d8j0ntlcm91z4.cloudfront.net/user_3FUcFIXMNsQ2O6pY7clK00lC9K1/hf_20260717_035031_070d1be4-f7d0-43bb-88cb-9fe0f50556e3.png"
          curl -sSL -o assets/tmp-mount/mount-2.png "https://d8j0ntlcm91z4.cloudfront.net/user_3FUcFIXMNsQ2O6pY7clK00lC9K1/hf_20260717_035031_7511cd2a-e231-4fff-9007-7515941342e3.png"

      - name: Commit
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/tmp-mount
          git commit -m "Add mount-scene start-image candidates for review"
          git push
