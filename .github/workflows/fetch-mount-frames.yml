# One-shot helper: downloads the generated mount-scene video on a runner
# (the dev sandbox's egress proxy can't reach the CDN) and extracts the
# replacement scene-1 frame sequence. Skips itself once frames exist;
# safe to delete after the frames are committed.
name: Fetch mount frames

on:
  push:
    branches:
      - claude/landing-page-redesign-oia51n

permissions:
  contents: write

env:
  VIDEO_URL: https://d8j0ntlcm91z4.cloudfront.net/user_3FUcFIXMNsQ2O6pY7clK00lC9K1/hf_20260717_035359_384cccd2-ad80-494c-ae0c-ae5ed52d125e.mp4

jobs:
  frames:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip if frames already exist
        id: check
        run: |
          if [ -d assets/frames ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install ffmpeg
        if: steps.check.outputs.skip == 'false'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Download video and extract WebP frames
        if: steps.check.outputs.skip == 'false'
        run: |
          curl -sSL -o /tmp/mount.mp4 "$VIDEO_URL"
          ffprobe -v error -show_entries format=duration -of csv=p=0 /tmp/mount.mp4
          mkdir -p assets/frames
          ffmpeg -hide_banner -loglevel error -i /tmp/mount.mp4 \
            -vf "fps=12,scale=1280:720:flags=lanczos" \
            -c:v libwebp -quality 72 assets/frames/f-%03d.webp
          ls assets/frames | wc -l
          du -sh assets/frames

      - name: Commit frames
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/frames
          git commit -m "Replace scene-1 frames with mount sequence"
          git push
